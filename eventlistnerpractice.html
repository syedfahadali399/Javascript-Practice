<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    #wide {
      width: 200px;
      height: 200px;
      border: 1px solid black;
      display: flex;
      align-items: center;
      text-align: center;
      justify-content: center;
    }
    body {
      height: 3000px;
      margin: 0;
    }

    #sticky {
      position: fixed;
      top: 0;
      background-color: lightblue;
      padding: 10px;
      width: 100%;
      z-index: 100;
    }
  </style>
  <body>
     <div id="sticky">Scroll Y: 0</div>
    <main>
      <h1 id="wide">Hover me</h1>
      <input type="text" id="checktext" />
      <p id="show"></p>

      <select id="selectMenu">
        <option value="">Choose one</option>
        <option value="apple">Apple</option>
        <option value="banana">Banana</option>
      </select>

      <form id="myForm">
        <input type="text" name="username" placeholder="Enter name" />
        <input type="number" name="age" placeholder="enter your age" />
        <button type="submit">Submit</button>
        <p id="showOnScreen"></p>
      </form>
      <input type="text" id="focusInput" placeholder="Click to focus" />
      <input type="text" id="blurInput" placeholder="Click then click outside" />
    </main>
    <script>
      // This both is use to changed the content on the screen
      let check = document.getElementById("wide");
      let checktext = document.getElementById("checktext");
      let show = document.getElementById("show");
      let showOnScreen = document.getElementById("showOnScreen");

      // // when mouse button is pressed it change content
      // check.addEventListener("mousedown", function() {
      //     check.textContent = "Content Changed"
      // })

      // When mouse button is released
      // check.addEventListener("mouseup", function() {
      //     check.textContent = "Content Changed"
      // })

      // When the mouse enters in the html tag width
      check.addEventListener("mouseover", function() {
          check.textContent = "Content Changed"
      })

      // When the mouse leaves in the html tag width
      check.addEventListener("mouseout", function() {
          check.textContent = "Good"
      })

      checktext.addEventListener("input", function () {
        show.textContent = `Number ${checktext.value.length}`;
      });

      //Triggered: When value changes AND input loses focus
      // Use Case: Dropdowns, radio buttons, file inputs
      // When value changes AND input loses focus
      const selectMenu = document.getElementById("selectMenu");
      selectMenu.addEventListener("change", function (e) {
        console.log("You selected:", e.target.value);
      });

      // Triggered: When a form is submitted
      // Use Case: Validate or stop form, send data with JavaScript
      //this code are use to get data from the form and dispaly on the screen   
      const form = document.getElementById("myForm");
      form.addEventListener("submit", function (e) {
        e.preventDefault(); // Stop page reload
        const data = new FormData(form);
        showOnScreen.textContent = `Username, ${data.get(
          "username"
        )} Age, ${data.get("age")}`;
      });

      // Triggered: When an input (or any focusable element) gets focus
      // Use Case: Highlight field, show hint/tooltips
      const focusInput = document.getElementById("focusInput");
       focusInput.addEventListener("focus", function () {
         console.log("Input is now focused");
       });

       //    Triggered: When an element loses focus 
       //    Use Case: Validate input, hide helper UI
       const blurInput = document.getElementById("blurInput");
       focusInput.addEventListener("blur", function () {
       console.log("Input lost focus");
       });

       const sticky = document.getElementById("sticky");

      // Triggered: Every time the user scrolls the page.
     // Use Case: Sticky header, scroll progress bar, lazy loading, animations.
    window.addEventListener("scroll", function () {
        if(window.scrollY >= 1300) {
            sticky.hidden = true
        } else if(window.scrollY <= 1300) {
            sticky.hidden = false
            sticky.textContent = "Scroll Y: " + window.scrollY;
        }
    });

    window.addEventListener("load", function () {
      alert("Page is fully loaded!");
    });
    </script>
  </body>
</html>
