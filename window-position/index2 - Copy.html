<!DOCTYPE html>
<html>
<head>
  <title>Sticky Header</title>
  <style>
    #header {
      position: fixed;
      top: 0;
      background: #333;
      color: white;
      padding: 10px;
      width: 100%;
    }
  </style>
</head>
<body style="height: 2000px;">
  <div id="header">ScrollY: 0</div>

  <script>
    const header = document.getElementById("header");

    window.addEventListener("scroll", () => {
      header.textContent = `ScrollY: ${window.scrollY}`;
    });
  </script>
</body>
</html>
