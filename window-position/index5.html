<!DOCTYPE html>
<html>
<head>
  <title>Scroll Progress</title>
  <style>
    #progressBar {
      position: fixed;
      top: 0;
      left: 0;
      height: 5px;
      background: green;
      width: 0%;
    }
  </style>
</head>
<body style="height: 3000px;">
  <div id="progressBar"></div>

  <script>
    const progressBar = document.getElementById("progressBar");
    // console.log(screen.width);
    // console.log(screen.height);
    
    
//     console.log(window.pageXOffset); // same as scrollX
// console.log(window.pageYOffset); // same as scrollY
// console.log(window.scrollX); // e.g., 250
// console.log(window.scrollY); // e.g., 500

//    console.log(window.screenLeft); // same as screenX
// console.log(window.screenTop);  // same as screenY
 
    console.log(window.screenX); // e.g., 100
console.log(window.screenY); // e.g., 200

    
    window.addEventListener("scroll", () => {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight- window.innerHeight;
        const scrollPercent = (scrollTop / docHeight) * 100;
        progressBar.style.width = scrollPercent + "%";
        // console.log(window.innerWidth);
        // console.log(window.innerHeight);
        // console.log(window.pageXOffset); // same as scrollX
        // console.log(window.pageYOffset); // same as scrollY
        // console.log(document.documentElement.scrollTop); // vertical scroll
        // console.log(document.documentElement.scrollLeft); // horizontal scroll

    });
  </script>
</body>
</html>
