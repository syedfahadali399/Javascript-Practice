<!DOCTYPE html>
<html>
<head>
  <title>Screen & Viewport Info</title>
</head>
<body>
  <h1>Screen and Viewport Info</h1>
  <p id="info"></p>

  <script>
    const info = document.getElementById("info");

    info.innerHTML = `
      <strong>Screen Width:</strong> ${screen.width}<br>
      <strong>Screen Height:</strong> ${screen.height}<br>
      <strong>Viewport Width:</strong> ${window.innerWidth}<br>
      <strong>Viewport Height:</strong> ${window.innerHeight}
    `;
  </script>
</body>
</html>
